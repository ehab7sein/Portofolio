<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#1e1e8a", "background-dark": "#0f172a", "card-dark": "#1e293b" },
                    fontFamily: { "sora": ["Sora", "sans-serif"], "inter": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-md rounded-3xl p-8 md:p-10 shadow-2xl">
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-xl shadow-primary/30">
                <span class="material-symbols-outlined text-white text-3xl">shield_person</span>
            </div>
            <h1 class="text-3xl font-extrabold sora-title mb-2 tracking-tighter">PORTFOLIO <span class="text-primary">ADMIN</span></h1>
            <p class="text-slate-400 font-medium">Please sign in to continue</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/20 text-red-500 text-sm py-3 px-4 rounded-xl text-center font-medium">
                Invalid username or password
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Username</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
                    <input type="text" name="username" required 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:border-primary transition-all text-white" 
                        placeholder="admin">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Password</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
                    <input type="password" name="password" required 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:border-primary transition-all text-white" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-2xl font-bold transition-all shadow-xl shadow-primary/20 flex items-center justify-center gap-3 mt-8">
                <span>Sign In</span>
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-white/5 text-center">
            <a href="/" class="text-slate-500 hover:text-white transition-colors text-sm font-medium flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Back to Website
            </a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.innerText = 'Checking...';
            errorMsg.classList.add('hidden');

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    window.location.href = '/admin';
                } else {
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = `<span>Sign In</span><span class="material-symbols-outlined">arrow_forward</span>`;
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMsg.innerText = 'An error occurred. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = `<span>Sign In</span><span class="material-symbols-outlined">arrow_forward</span>`;
            }
        };
    </script>
</body>
</html>
